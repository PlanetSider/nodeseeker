services:
  nodeseeker:
    image: ${NODESEEKER_IMAGE:-ghcr.io/planetsider/nodeseeker:latest}
    container_name: nodeseeker
    restart: unless-stopped
    ports:
      - "${PORT:-3010}:3010"
    environment:
      NODE_ENV: production
      PORT: 3010
      HOST: 0.0.0.0
      DATABASE_PATH: /usr/src/app/data/nodeseeker.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3010}
      RSS_TIMEOUT: ${RSS_TIMEOUT:-10000}
      RSS_CHECK_ENABLED: ${RSS_CHECK_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - nodeseeker_data:/usr/src/app/data
      - nodeseeker_logs:/usr/src/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  nodeseeker_data:
    name: nodeseeker_data
  nodeseeker_logs:
    name: nodeseeker_logs
