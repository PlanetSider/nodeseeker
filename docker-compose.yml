services:
  nodeseeker:
    image: ghcr.io/planetsider/nodeseeker:latest
    container_name: nodeseeker
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: production
      PORT: 3010
      HOST: 0.0.0.0
      DATABASE_PATH: /usr/src/app/data/nodeseeker.db
      CORS_ORIGINS: http://localhost:3010
      RSS_TIMEOUT: 10000
      RSS_CHECK_ENABLED: "true"
      LOG_LEVEL: info
    volumes:
      - ./data:/usr/src/app/data
      - ./logs:/usr/src/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
